name: Build Native Image

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-native:
    name: Build Native Image (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Visual Studio (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Build Native Image
        run: mvn clean native:compile -Pnative -DskipTests

      - name: Upload Native Binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: demo-native-linux
          path: target/demo
          retention-days: 14

      - name: Upload Native Binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: demo-native-windows
          path: target/demo.exe
          retention-days: 14

      - name: Test Native Binary (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ -f target/demo ]; then
            echo "Native binary created successfully!"
            ls -lh target/demo
            ./target/demo &
            APP_PID=$!
            sleep 5
            curl -f http://localhost:8080/ || exit 1
            kill $APP_PID
          else
            echo "Native binary not found!"
            exit 1
          fi

      - name: Test Native Binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "target\demo.exe") {
            Write-Host "Native binary created successfully!"
            Get-Item "target\demo.exe" | Select-Object Length
            Start-Process -FilePath "target\demo.exe" -NoNewWindow
            Start-Sleep -Seconds 10
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/" -UseBasicParsing
              Write-Host "Response: $($response.Content)"
              if ($response.StatusCode -eq 200) {
                Write-Host "Test passed!"
              } else {
                Write-Host "Test failed with status code: $($response.StatusCode)"
                exit 1
              }
            } catch {
              Write-Host "Failed to connect to app: $_"
              exit 1
            } finally {
              Stop-Process -Name "demo" -Force -ErrorAction SilentlyContinue
            }
          } else {
            Write-Host "Native binary not found!"
            exit 1
          }
